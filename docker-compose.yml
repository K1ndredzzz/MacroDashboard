services:
  # PostgreSQL - Main database (replaces BigQuery)
  postgres:
    image: postgres:16-alpine
    container_name: macro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: macro_dashboard
      POSTGRES_USER: macro_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/postgres:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"  # 外部5433，避免与本地PostgreSQL冲突
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macro_user -d macro_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache layer
  redis:
    image: redis:7-alpine
    container_name: macro-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"  # 外部6380，避免与本地Redis冲突
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # FastAPI - Backend API
  api:
    image: fuzhouxing/macro-dashboard-api:latest
    container_name: macro-api
    restart: unless-stopped
    environment:
      # Application
      APP_NAME: "Macro Dashboard API"
      APP_VERSION: "0.1.0"
      DEBUG: "false"

      # Database
      DATABASE_URL: postgresql://macro_user:${POSTGRES_PASSWORD}@postgres:5432/macro_dashboard
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: macro_dashboard
      POSTGRES_USER: macro_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      # Redis
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # FRED API
      FRED_API_KEY: ${FRED_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8020:8000"  # 外部8020
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Data Collection Cron Job
  data-collector:
    image: fuzhouxing/macro-dashboard-collector:latest
    container_name: macro-collector
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://macro_user:${POSTGRES_PASSWORD}@postgres:5432/macro_dashboard
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: macro_dashboard
      POSTGRES_USER: macro_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      FRED_API_KEY: ${FRED_API_KEY}
      CRON_SCHEDULE: "0 */6 * * *"  # Every 6 hours
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend - React application
  frontend:
    image: fuzhouxing/macro-dashboard-frontend:latest
    container_name: macro-frontend
    restart: unless-stopped
    ports:
      - "8021:80"  # 外部8021
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: macro-network
